<div class="tab-pane fade show active" id="softwater-makeup" role="tabpanel">
    <h5 class="mt-4 mb-3">Softwater Makeup Quantity Details</h5>
    <table class="table table-bordered" id="softwater-makeup-table">
        <thead class="table-light">
            <tr>
                <th>Date</th>
                <th>Combi</th>
                <th>Billet N Slab Machine</th>
                <th>LRF 1</th>
                <th>LRF 2&3</th>
                <th>EAF-1</th>
                <th>EAF-2</th>
                <th>FES</th>
                <th>SLAB CASTER</th>
            </tr>
        </thead>
        <tbody>
            {% for i in range(5) %}
            <tr>
                <td><input type="date" name="softwater_makeup_Date_{{ i }}_value" class="form-control" value="{{ existing_data.get('softwater_makeup_Date_' + i|string, '') }}"></td>
                <td><input type="number" step="0.01" name="softwater_makeup_Combi_{{ i }}_value" class="form-control" value="{{ existing_data.get('softwater_makeup_Combi_' + i|string, '') }}"></td>
                <td><input type="number" step="0.01" name="softwater_makeup_Billet_Slab_{{ i }}_value" class="form-control" value="{{ existing_data.get('softwater_makeup_Billet_Slab_' + i|string, '') }}"></td>
                <td><input type="number" step="0.01" name="softwater_makeup_LRF1_{{ i }}_value" class="form-control" value="{{ existing_data.get('softwater_makeup_LRF1_' + i|string, '') }}"></td>
                <td><input type="number" step="0.01" name="softwater_makeup_LRF2_3_{{ i }}_value" class="form-control" value="{{ existing_data.get('softwater_makeup_LRF2_3_' + i|string, '') }}"></td>
                <td><input type="number" step="0.01" name="softwater_makeup_EAF1_{{ i }}_value" class="form-control" value="{{ existing_data.get('softwater_makeup_EAF1_' + i|string, '') }}"></td>
                <td><input type="number" step="0.01" name="softwater_makeup_EAF2_{{ i }}_value" class="form-control" value="{{ existing_data.get('softwater_makeup_EAF2_' + i|string, '') }}"></td>
                <td><input type="number" step="0.01" name="softwater_makeup_FES_{{ i }}_value" class="form-control" value="{{ existing_data.get('softwater_makeup_FES_' + i|string, '') }}"></td>
                <td><input type="number" step="0.01" name="softwater_makeup_Slab_Caster_{{ i }}_value" class="form-control" value="{{ existing_data.get('softwater_makeup_Slab_Caster_' + i|string, '') }}"></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div class="mb-3">
        <button type="button" class="btn btn-outline-secondary" onclick="addSoftwaterRow()">➕ Add Row</button>
    </div>
</div>
<script>
let softwaterRowCount = 5;

function addSoftwaterRow() {
    const table = document.getElementById('softwater-makeup-table').getElementsByTagName('tbody')[0];
    const row = document.createElement('tr');

    row.innerHTML = `
        <td><input type="date" name="softwater_makeup_Date_${softwaterRowCount}_value" class="form-control"></td>
        <td><input type="number" step="0.01" name="softwater_makeup_Combi_${softwaterRowCount}_value" class="form-control"></td>
        <td><input type="number" step="0.01" name="softwater_makeup_Billet_Slab_${softwaterRowCount}_value" class="form-control"></td>
        <td><input type="number" step="0.01" name="softwater_makeup_LRF1_${softwaterRowCount}_value" class="form-control"></td>
        <td><input type="number" step="0.01" name="softwater_makeup_LRF2_3_${softwaterRowCount}_value" class="form-control"></td>
        <td><input type="number" step="0.01" name="softwater_makeup_EAF1_${softwaterRowCount}_value" class="form-control"></td>
        <td><input type="number" step="0.01" name="softwater_makeup_EAF2_${softwaterRowCount}_value" class="form-control"></td>
        <td><input type="number" step="0.01" name="softwater_makeup_FES_${softwaterRowCount}_value" class="form-control"></td>
        <td><input type="number" step="0.01" name="softwater_makeup_Slab_Caster_${softwaterRowCount}_value" class="form-control"></td>
    `;

    table.appendChild(row);
    softwaterRowCount++;
}
</script>
